<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisie des notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 450px;">
        <h2 class="text-center">Saisie des notes</h2>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="student" class="form-label">Étudiant</label>
                {{ form.student }}
            </div>
            <div class="mb-3">
                <label for="subject" class="form-label">Matière</label>
                {{ form.subject }}
            </div>
            <div class="mb-3">
                <label for="value" class="form-label">Note</label>
                {{ form.value }}
            </div>
            <button type="submit" class="btn btn-primary w-100">Enregistrer la note</button>
        </form>

        <p class="text-center mt-3"><a href="{% url 'home' %}">Retour à l'accueil</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
