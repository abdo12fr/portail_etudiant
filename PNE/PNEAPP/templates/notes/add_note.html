{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container mt-5" style="background: linear-gradient(to bottom right, #e6f7ff, #ffffff); border-radius: 10px; padding: 30px;">
    <h2 class="text-center text-primary mb-4">Ajouter une note</h2>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-success" role="alert">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group mb-3">
            <label>Nom et Prénom de l'élève</label>
            {{ form.nom_prenom }}  <!-- Affichage du champ nom/prénom -->
        </div>
        <div class="form-group mb-3">
            <label>Matière</label>
            {{ form.matiere }}  <!-- Affichage du champ matière -->
        </div>
        <div class="form-group mb-3">
            <label>Note (0 - 20)</label>
            {{ form.note }}  <!-- Affichage du champ note -->
        </div>
        <div class="form-group mb-3">
            <label>Mention</label>
            {{ form.mention }}  <!-- Affichage du champ mention -->
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary btn-lg">Ajouter la note</button>
        </div>
    </form>

</div>
{% endblock %}
